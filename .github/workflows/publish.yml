name: Publish to npm and ClawHub

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test
        env:
          SKIP_INTEGRATION: '1'

      # Publish to npm
      # --ignore-scripts skips prepublishOnly (already built and tested above)
      - run: npm publish --access=public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ClawHub
      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          VERSION=${GITHUB_REF_NAME#v}
          clawhub publish ./packages/openclaw-plugin-ain \
            --slug openclaw-plugin-ain \
            --name "AIN - AI Node Plugin" \
            --version "$VERSION" \
            --changelog "Automated release v$VERSION" \
            --tags latest
